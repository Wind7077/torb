name: Send Bridges to Telegram

on:
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Download webtunnel bridges
        run: |
          curl -fsSL \
            "https://raw.githubusercontent.com/Delta-Kronecker/Tor-Bridges-Collector/main/bridge/webtunnel_tested.txt" \
            -o webtunnel.txt

          # obfs4 — закомментировано
          # curl -fsSL \
          #   "https://raw.githubusercontent.com/Delta-Kronecker/Tor-Bridges-Collector/main/bridge/obfs4_tested.txt" \
          #   -o obfs4.txt

      - name: Send webtunnel bridges to Telegram
        run: |
          BOT_TOKEN="${{ secrets.TG_BOT_TOKEN }}"
          CHAT_ID="${{ secrets.TG_CHAT_ID }}"

          COUNT=$(grep -c '^webtunnel ' webtunnel.txt || true)
          SNI_COUNT=$(grep -c 'sni-imitation' webtunnel.txt || true)

          # Заголовок
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d parse_mode="Markdown" \
            -d text="🧅 *WEBTUNNEL bridges* — ${COUNT} шт.
          ⭐ С SNI-imitation: ${SNI_COUNT} шт.
          🕐 $(date -u '+%Y-%m-%d %H:%M UTC')

          _Тапни на bridge чтобы скопировать_
          _Мосты ⭐ SNI лучше обходят белые списки РФ_"
          sleep 0.5

          # Функция отправки chunk-а
          send_chunk() {
            local text="$1"
            curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
              -d chat_id="${CHAT_ID}" \
              -d parse_mode="Markdown" \
              --data-urlencode "text=${text}"
            sleep 0.5
          }

          # SNI bridges — первыми
          SNI_LINES=$(grep 'sni-imitation' webtunnel.txt || true)
          if [ -n "$SNI_LINES" ]; then
            curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
              -d chat_id="${CHAT_ID}" \
              -d parse_mode="Markdown" \
              -d text="⭐ *Bridges с SNI-imitation:*"
            sleep 0.5

            i=0
            chunk=""
            while IFS= read -r line; do
              [[ -z "$line" ]] && continue
              chunk="${chunk}\`${line}\`
          ⭐ _SNI-imitation_

          "
              i=$((i+1))
              if [ $i -eq 10 ]; then
                send_chunk "$chunk"
                chunk=""
                i=0
              fi
            done <<< "$SNI_LINES"
            [ -n "$chunk" ] && send_chunk "$chunk"
          fi

          # Остальные bridges
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d parse_mode="Markdown" \
            -d text="🌐 *Остальные webtunnel bridges:*"
          sleep 0.5

          i=0
          chunk=""
          while IFS= read -r line; do
            [[ "$line" =~ ^# ]] && continue
            [[ -z "$line" ]] && continue
            [[ "$line" == *"sni-imitation"* ]] && continue
            chunk="${chunk}\`${line}\`

          "
            i=$((i+1))
            if [ $i -eq 15 ]; then
              send_chunk "$chunk"
              chunk=""
              i=0
            fi
          done < <(grep '^webtunnel ' webtunnel.txt)

          [ -n "$chunk" ] && send_chunk "$chunk"

          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d text="✅ Готово! Отправлено: ${COUNT} bridges."
