name: Send Bridges to Telegram

on:
  schedule:
    - cron: '0 */4 * * *'   # каждые 4 часа
  workflow_dispatch:          # ручной запуск

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Download webtunnel bridges
        run: |
          curl -fsSL \
            "https://raw.githubusercontent.com/Delta-Kronecker/Tor-Bridges-Collector/main/bridge/webtunnel_tested.txt" \
            -o webtunnel.txt
          curl -fsSL \
            "https://raw.githubusercontent.com/Delta-Kronecker/Tor-Bridges-Collector/main/bridge/obfs4_tested.txt" \
            -o obfs4.txt

      - name: Send webtunnel bridges to Telegram
        run: |
          BOT_TOKEN="${{ secrets.TG_BOT_TOKEN }}"
          CHAT_ID="${{ secrets.TG_CHAT_ID }}"

          # Считаем количество
          COUNT=$(grep -c '^webtunnel ' webtunnel.txt || true)

          # Отправляем заголовок
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d parse_mode="Markdown" \
            -d text="🧅 *WEBTUNNEL bridges* — ${COUNT} шт.
          Обновлено: $(date -u '+%Y-%m-%d %H:%M UTC')"

          # Отправляем по 5 штук
          i=0
          chunk=""
          while IFS= read -r line; do
            [[ "$line" =~ ^# ]] && continue
            [[ -z "$line" ]] && continue
            chunk="${chunk}\`${line}\`

          "
            i=$((i+1))
            if [ $i -eq 5 ]; then
              curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
                -d chat_id="${CHAT_ID}" \
                -d parse_mode="Markdown" \
                --data-urlencode "text=${chunk}"
              chunk=""
              i=0
              sleep 1
            fi
          done < <(grep '^webtunnel ' webtunnel.txt)

          # Остаток
          if [ -n "$chunk" ]; then
            curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
              -d chat_id="${CHAT_ID}" \
              -d parse_mode="Markdown" \
              --data-urlencode "text=${chunk}"
          fi

      - name: Send obfs4 bridges to Telegram
        run: |
          BOT_TOKEN="${{ secrets.TG_BOT_TOKEN }}"
          CHAT_ID="${{ secrets.TG_CHAT_ID }}"

          COUNT=$(grep -c '^obfs4 ' obfs4.txt || true)

          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d parse_mode="Markdown" \
            -d text="🔒 *OBFS4 bridges* — ${COUNT} шт."

          i=0
          chunk=""
          while IFS= read -r line; do
            [[ "$line" =~ ^# ]] && continue
            [[ -z "$line" ]] && continue
            chunk="${chunk}\`${line}\`

          "
            i=$((i+1))
            if [ $i -eq 5 ]; then
              curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
                -d chat_id="${CHAT_ID}" \
                -d parse_mode="Markdown" \
                --data-urlencode "text=${chunk}"
              chunk=""
              i=0
              sleep 1
            fi
          done < <(grep '^obfs4 ' obfs4.txt)

          if [ -n "$chunk" ]; then
            curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
              -d chat_id="${CHAT_ID}" \
              -d parse_mode="Markdown" \
              --data-urlencode "text=${chunk}"
          fi

      - name: Send done message
        run: |
          BOT_TOKEN="${{ secrets.TG_BOT_TOKEN }}"
          CHAT_ID="${{ secrets.TG_CHAT_ID }}"
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d text="✅ Готово! Следующее обновление через 4 часа."
