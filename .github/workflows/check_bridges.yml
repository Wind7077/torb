name: Tor Bridge Checker

on:
  schedule:
    - cron: '0 */4 * * *'   # каждые 4 часа
  workflow_dispatch:          # ручной запуск из GitHub UI

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tor + obfs4proxy
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y tor obfs4proxy

      - name: Download bridge lists
        run: |
          BASE="https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/TOR-BRIDGES"
          curl -fsSL "$BASE/TOR_BRIDGES_OBFS4.txt"      -o raw_obfs4.txt
          curl -fsSL "$BASE/TOR_BRIDGES_WEBTUNNEL.txt"  -o raw_webtunnel.txt
          echo "obfs4 bridges:     $(grep -c '^obfs4 '      raw_obfs4.txt     || true)"
          echo "webtunnel bridges: $(grep -c '^webtunnel '  raw_webtunnel.txt || true)"

      - name: Check obfs4 bridges
        run: |
          chmod +x scripts/check_bridges.sh
          bash scripts/check_bridges.sh raw_obfs4.txt obfs4 working_obfs4.txt

      - name: Check webtunnel bridges
        run: |
          bash scripts/check_bridges.sh raw_webtunnel.txt webtunnel working_webtunnel.txt

      - name: Commit results to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add working_obfs4.txt working_webtunnel.txt
          git diff --cached --quiet || git commit -m "🔄 Bridge check $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
